name: Terraform CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/terraform-ci.yml'
      - '.github/workflows/terraform-cd.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-ci:
    name: Terraform CI (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev]

    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Prepare Terraform variables
        env:
          INPUT_VPC_NAME: ${{ vars.VPC_NAME }}
          INPUT_VPC_CIDR: ${{ vars.VPC_CIDR }}
          INPUT_SUBNET_CIDR: ${{ vars.SUBNET_CIDR }}
          INPUT_AVAILABILITY_ZONE: ${{ vars.AVAILABILITY_ZONE }}
        run: |
          if [ -z "${{ secrets.BUCKET_PREFIX }}" ]; then
            echo "BUCKET_PREFIX secret is empty/missing"
            exit 1
          fi

          echo "TF_VAR_aws_region=us-east-1" >> "$GITHUB_ENV"
          echo "TF_VAR_bucket_name=${{ secrets.BUCKET_PREFIX }}" >> "$GITHUB_ENV"
          echo "TF_VAR_vpc_name=${INPUT_VPC_NAME:-dev-vpc}" >> "$GITHUB_ENV"
          echo "TF_VAR_vpc_cidr=${INPUT_VPC_CIDR:-10.0.0.0/16}" >> "$GITHUB_ENV"
          echo "TF_VAR_subnet_cidr=${INPUT_SUBNET_CIDR:-10.0.1.0/24}" >> "$GITHUB_ENV"
          echo "TF_VAR_availability_zone=${INPUT_AVAILABILITY_ZONE:-us-east-1a}" >> "$GITHUB_ENV"
          echo "Terraform variables prepared"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -input=false -no-color -out=tfplan

      - name: Show planned bucket
        run: terraform show -no-color tfplan | sed -n '/aws_s3_bucket.this/,+20p'

      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: environments/${{ matrix.environment }}/tfplan