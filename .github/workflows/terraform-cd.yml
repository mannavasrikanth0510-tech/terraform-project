name: Terraform CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/terraform-cd.yml'

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Verify AWS account
        run: aws sts get-caller-identity

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.BUCKET_PREFIX }}" ]; then
            echo "BUCKET_PREFIX secret is empty/missing"
            exit 1
          fi
          if [ -z "${{ secrets.VPC_NAME }}" ]; then
            echo "VPC_NAME secret is empty/missing"
            exit 1
          fi
          if [ -z "${{ secrets.VPC_CIDR }}" ]; then
            echo "VPC_CIDR secret is empty/missing"
            exit 1
          fi
          if [ -z "${{ secrets.SUBNET_CIDR }}" ]; then
            echo "SUBNET_CIDR secret is empty/missing"
            exit 1
          fi
          if [ -z "${{ secrets.AVAILABILITY_ZONE }}" ]; then
            echo "AVAILABILITY_ZONE secret is empty/missing"
            exit 1
          fi
          echo "All required secrets are set"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: |
          terraform plan -input=false -no-color -out=tfplan \
          -var="aws_region=us-east-1" \
          -var="bucket_prefix=${{ secrets.BUCKET_PREFIX }}" \
          -var="vpc_name=${{ secrets.VPC_NAME }}" \
          -var="vpc_cidr=${{ secrets.VPC_CIDR }}" \
          -var="subnet_cidr=${{ secrets.SUBNET_CIDR }}" \
          -var="availability_zone=${{ secrets.AVAILABILITY_ZONE }}"

      - name: Show planned bucket
        run: terraform show -no-color tfplan | sed -n '/aws_s3_bucket.this/,+20p'

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Output
        run: terraform output